  test:
#    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.6
        env:
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 30s --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Check and start Postgresql
        run: |
          
          sudo systemctl daemon-reload
          sudo systemctl restart postgresql
          sudo systemctl status postgresql

      - name: Wait for PostgreSQL to be ready
        run: |
          export PYTHONPATH="${PYTHONPATH}:/home/runner/work/habit_traker/habit_traker"
          export DJANGO_SETTINGS_MODULE=config.settings
          until poetry run python -c "from django.db import connection; connection.ensure_connection()"; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
          echo "PostgreSQL is ready!"

      - name: Run database migrations (test)
        run: poetry run python manage.py migrate --no-input

      - name: Collect static files (test)
        run: poetry run python manage.py collectstatic --no-input

      - name: Run Django tests
        run: poetry run python manage.py test

