name: Django CI

on: [push, pull_request]

env:
  SECRET_KEY: ${{ secrets.SECRET_KEY }}
  POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
  POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
  POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
  POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Run Flake8
      run: flake8 .

  test:
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.6
        env:
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 30s --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Check and start Postgresql
        run: |

          sudo systemctl daemon-reload
          sudo systemctl restart postgresql
          sudo systemctl status postgresql

      - name: Wait for PostgreSQL to be ready
        run: |
          export PYTHONPATH="${PYTHONPATH}:/home/runner/work/habit_traker/habit_traker"
          export DJANGO_SETTINGS_MODULE=config.settings
          until poetry run python -c "from django.db import connection; connection.ensure_connection()"; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
          echo "PostgreSQL is ready"

      - name: Run database migrations (test)
        run: poetry run python manage.py migrate --no-input

      - name: Collect static files (test)
        run: poetry run python manage.py collectstatic --no-input

      - name: Run Django tests
        run: poetry run python manage.py test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create .env file
        run: |
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" > .env
          echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
          echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env
          echo "POSTGRES_PORT=${{ secrets.POSTGRES_PORT }}" >> .env
          echo "POSTGRES_HOST=${{ secrets.POSTGRES_HOST }}" >> .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Install Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install docker-compose -y

      - name: Build Docker images
        run: docker-compose build

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: SECRET_KEY,POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB,POSTGRES_PORT,POSTGRES_HOST

          script: |
            PROJECT_DIR="${{ secrets.DEPLOY_DIR }}habit_traker"
            ENV_FILE="${{ secrets.DEPLOY_DIR }}.env.habits"
            
            if [ -d "$PROJECT_DIR" ]; then
            ls -la $PROJECT_DIR
            else
            echo "Creating directory..."
            mkdir -p $PROJECT_DIR
            fi
                        
            cd $PROJECT_DIR
            
            echo "Current directory: $(pwd)"
            
            docker system prune -f
            
            if [ ! -d ".git" ]; then
              git clone https://github.com/Ananim4eg/habits_traker.git .
            else
              git fetch origin
              git reset --hard origin/feature/home_work_project5
            fi
            
            if [ ! -f ".env" ]; then
              cp "$ENV_FILE" .env
            fi
            
            docker-compose down
            docker-compose up -d --build
