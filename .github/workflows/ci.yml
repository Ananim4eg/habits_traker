  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: SECRET_KEY,POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB,POSTGRES_PORT,POSTGRES_HOST

          script: |
            PROJECT_DIR="${{ secrets.DEPLOY_DIR }}habit_traker"
            
            if [ -d "$PROJECT_DIR" ]; then
            echo "✅ Directory exists"
            echo "📂 Contents:"
            ls -la $PROJECT_DIR
            else
            echo "❌ Directory does not exist"
            echo "Creating directory..."
            mkdir -p $PROJECT_DIR
            fi
                        
            cd $PROJECT_DIR
            
            echo "Current directory: $(pwd)"
            
            docker system prune -f
            
            if [ ! -d ".git" ]; then
              echo "📥 Cloning repository..."
              git clone https://github.com/Ananim4eg/habits_traker.git .
            else
              echo "📥 Pulling latest changes..."
              git pull origin feature/home_work_project5
            fi
            
            docker-compose down
            docker-compose --env-file /home/vlad/.env up -d --build
